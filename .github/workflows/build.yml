name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  build-tauri:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: nodeshift-linux-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nodeshift-macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nodeshift-macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nodeshift-windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use ad-hoc signing for CI builds (no Apple certificate needed)
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          args: --target ${{ matrix.target }}

      # Upload the raw binary as artifact (portable)
      - name: Upload portable binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-portable
          path: src-tauri/target/${{ matrix.target }}/release/nodeshift

      - name: Upload portable binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-portable
          path: src-tauri/target/${{ matrix.target }}/release/nodeshift.exe

      # Upload installer artifacts
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-installer
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
