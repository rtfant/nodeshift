name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            portable_name: NodeShift-linux-x64
            binary_name: nodeshift
            binary_ext: ""
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          #   portable_name: NodeShift-macos-arm64
          #   binary_name: nodeshift
          #   binary_ext: ""
          # - platform: macos-latest
          #   target: x86_64-apple-darwin
          #   portable_name: NodeShift-macos-x64
          #   binary_name: nodeshift
          #   binary_ext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            portable_name: NodeShift-windows-x64
            binary_name: nodeshift.exe
            binary_ext: ".exe"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # macOS: import code signing certificate
      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            rm certificate.p12
          fi

      - run: npm ci

      # macOS: set signing config via GITHUB_ENV
      # - With certificate: uses real identity + notarization
      # - Without certificate: uses ad-hoc signing (-), no notarization
      - name: Set macOS signing identity
        if: runner.os == 'macOS'
        env:
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLEID: ${{ secrets.APPLE_ID }}
          APPLEPWD: ${{ secrets.APPLE_PASSWORD }}
          TEAMID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$IDENTITY" ]; then
            echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
            echo "APPLE_ID=$APPLEID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLEPWD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$TEAMID" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi

      # Build Tauri app (produces both binary and installers)
      # Note: APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      # are inherited from GITHUB_ENV (set by previous step on macOS only).
      # Do NOT redeclare them here — empty strings would trigger notarization.
      - name: Build and release (installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing & notarization (set by previous step, empty on non-macOS)
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          # Windows code signing
          TAURI_WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NodeShift ${{ github.ref_name }}"
          releaseBody: |
            ## NodeShift ${{ github.ref_name }}

            ### Portable (解压即用，无需安装)

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `NodeShift-windows-x64.zip` |
            | macOS ARM (Apple Silicon) | `NodeShift-macos-arm64.zip` |
            | macOS Intel | `NodeShift-macos-x64.zip` |
            | Linux x64 | `NodeShift-linux-x64.zip` |

            ### Installer (安装包)

            见下方附件 (.msi / .dmg / .deb / .AppImage)

            ---

            **使用方式 (Portable)**:
            1. 下载对应平台的 .zip 文件
            2. 解压到任意目录
            3. 运行 `NodeShift` (macOS/Linux) 或 `NodeShift.exe` (Windows)

          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # --- Create Portable zip: single exe, extract and run ---
      - name: Create portable zip (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if [ -f "$BINARY" ]; then
            chmod +x "$BINARY"
            # Create a temp dir with a clean name
            mkdir -p _portable
            cp "$BINARY" "_portable/NodeShift${{ matrix.binary_ext }}"
            cd _portable
            zip -9 "../${{ matrix.portable_name }}.zip" "NodeShift${{ matrix.binary_ext }}"
            cd ..
            rm -rf _portable
          else
            echo "::error::Binary not found at $BINARY"
            ls -la "src-tauri/target/${{ matrix.target }}/release/" || true
            exit 1
          fi

      - name: Create portable zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if (Test-Path $binary) {
            # Create portable folder with clean name
            New-Item -ItemType Directory -Path "_portable" -Force
            Copy-Item $binary "_portable/NodeShift.exe"
            Compress-Archive -Path "_portable/NodeShift.exe" -DestinationPath "${{ matrix.portable_name }}.zip" -CompressionLevel Optimal
            Remove-Item -Recurse -Force "_portable"
          } else {
            Write-Error "Binary not found at $binary"
            Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Upload portable zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.portable_name }}.zip
          tag_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
